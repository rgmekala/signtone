services:
  mongodb:
    image: mongodb/mongodb-community-server:8.2.0-ubi9
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongot:
    image: mongodb/mongodb-community-search:latest
    ports:
      - "27028:27028"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGOT_DATA_DIR=/var/lib/mongot

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
